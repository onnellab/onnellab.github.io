<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ONNELLAB 게시 상태 대시보드</title>
  <meta name="theme-color" content="#fffaf5">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="googlebot" content="noindex,nofollow,noarchive">
  <meta name="naverbot" content="noindex,nofollow,noarchive">
  <meta name="yeti" content="noindex,nofollow,noarchive">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ONNEL Dashboard">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="/favicon.svg?v=20260713-ol-pastel-v1" type="image/svg+xml">
  <link rel="icon" href="/favicon-32x32.png?v=20260713-ol-pastel-v1" sizes="32x32" type="image/png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-180.png?v=20260713-dashboard-bg">
  <style>
    :root {
      --ink: #191714; --muted: #746f69; --line: #ddd4ca; --surface: #fffaf5; --panel: #ffffff;
      --blue: #2e6fbb; --blue-soft: #e8f1fb; --peach: #f4c3b4; --peach-soft: #fff0ea;
      --lilac: #d8cdf7; --lilac-soft: #f4f0ff; --sky: #cfe6ff; --sky-soft: #eef7ff;
      --ok: #2f7a52; --ok-soft: #edf8f1; --bad: #b3261e; --bad-soft: #fff0ee;
      --shadow: 0 14px 35px rgba(47, 38, 28, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--surface); }
    header { position: sticky; top: 0; z-index: 5; border-bottom: 1px solid rgba(221, 212, 202, .85); background: rgba(255, 250, 245, .94); backdrop-filter: blur(14px); }
    .bar { max-width: 1180px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: 0; color: inherit; text-decoration: none; }
    .mark { width: 32px; height: 32px; display: block; object-fit: contain; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .summary { display: flex; gap: 8px; flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .pill { min-height: 31px; border: 1px solid var(--line); padding: 6px 9px; background: rgba(255,255,255,.75); color: var(--muted); border-radius: 999px; }
    .pill.is-active { border-color: var(--blue); background: var(--blue-soft); color: var(--blue); font-weight: 800; }
    .lang { min-height: 31px; border-color: var(--line); background: var(--ink); color: #fff; padding: 6px 10px; border-radius: 999px; font-size: 12px; white-space: nowrap; }
    main { max-width: 1180px; margin: 0 auto; padding: 22px 20px 56px; }
    .overview { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 14px; }
    .metric-card { border: 1px solid var(--line); background: var(--panel); color: var(--ink); padding: 14px; border-radius: 8px; box-shadow: var(--shadow); min-height: 88px; display: flex; flex-direction: column; justify-content: space-between; text-align: left; }
    .metric-card:nth-child(1) { background: linear-gradient(135deg, var(--peach-soft), #fff); }
    .metric-card:nth-child(2) { background: linear-gradient(135deg, var(--sky-soft), #fff); }
    .metric-card:nth-child(3) { background: linear-gradient(135deg, var(--ok-soft), #fff); }
    .metric-card:nth-child(4) { background: linear-gradient(135deg, var(--lilac-soft), #fff); }
    .metric-card:nth-child(5) { background: linear-gradient(135deg, var(--blue-soft), #fff); }
    .metric-card span { color: var(--muted); font-size: 12px; }
    .metric-card strong { font-size: 28px; line-height: 1; letter-spacing: 0; }
    .metric-card strong.state-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .metric-card strong > span:not(.state-subtext) { color: inherit; font-size: 28px; line-height: 1; }
    .metric-card .spinner { width: 18px; height: 18px; border: 2px solid rgba(46,111,187,.22); border-top-color: var(--blue); border-radius: 999px; animation: spin .8s linear infinite; flex: 0 0 auto; }
    .metric-card .state-subtext { font-size: 12px; font-weight: 800; color: var(--muted); line-height: 1.2; }
    .metric-card.is-working { border-color: var(--blue); outline: 2px solid rgba(46,111,187,.14); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .metric-card.is-active { border-color: var(--blue); outline: 2px solid rgba(46,111,187,.16); }
    .metric-card:disabled { cursor: default; opacity: .72; transform: none; }
    .atm-action { display: grid; grid-template-columns: minmax(0, 1fr) minmax(220px, 320px); gap: 14px; align-items: center; border: 1px solid var(--line); background: rgba(255,255,255,.86); border-radius: 8px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .atm-action h1 { margin: 0 0 6px; font-size: 24px; line-height: 1.2; }
    .atm-action p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .atm-note { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .atm-action button { min-height: 66px; font-size: 20px; font-weight: 900; background: var(--blue); border-color: var(--blue); }
    .atm-action button:disabled { opacity: .72; cursor: default; }
    .atm-side { display: grid; gap: 8px; }
    .atm-status-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .atm-status-row button { min-height: 46px; background: #fff; color: var(--ink); border-color: var(--line); padding: 8px; font-size: 12px; font-weight: 800; text-align: left; }
    .atm-status-row button strong { display: block; margin-top: 3px; font-size: 15px; line-height: 1.1; }
    .atm-status-row button strong > span:not(.state-subtext) { color: inherit; font-size: 15px; line-height: 1.1; }
    .atm-status-row button .state-subtext { display: block; margin-top: 2px; font-size: 11px; color: var(--muted); }
    .run-link { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 999px; background: #fff; color: var(--blue); font-size: 12px; font-weight: 900; text-decoration: none; padding: 7px 10px; }
    .run-link:hover { border-color: var(--blue); background: var(--blue-soft); }
    .run-link[hidden] { display: none; }
    .verification-summary { border: 1px solid var(--line); background: rgba(255,255,255,.86); border-radius: 8px; padding: 12px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .verification-summary strong { display: block; font-size: 15px; margin-bottom: 8px; }
    .verification-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .verification-summary-grid span { display: block; border: 1px solid var(--line); border-radius: 8px; background: #fffdf9; color: var(--muted); font-size: 12px; line-height: 1.4; padding: 8px; overflow-wrap: anywhere; }
    .verification-summary-grid b { display: block; color: var(--ink); font-size: 17px; line-height: 1.1; margin-top: 3px; }
    .verification-summary .note { margin-top: 8px; }
    .tool-panel { border: 1px solid var(--line); background: rgba(255,255,255,.86); border-radius: 8px; padding: 10px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .quick-row { display: grid; grid-template-columns: minmax(180px, .9fr) minmax(220px, 1.2fr) auto; gap: 10px; align-items: center; }
    .auth { display: grid; grid-template-columns: minmax(220px, 1fr) repeat(3, auto); gap: 8px; margin-top: 12px; }
    details.advanced { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 10px; }
    details.advanced summary { cursor: pointer; color: var(--ink); font-weight: 800; min-height: 38px; display: inline-flex; align-items: center; gap: 8px; width: fit-content; border: 1px solid var(--line); background: var(--panel); border-radius: 999px; padding: 7px 12px; }
    .controls { display: grid; grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(116px, 150px)); gap: 10px; margin-top: 8px; }
    .secondary-controls { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    .platform-status { margin-top: 18px; }
    .platform-status summary { cursor: pointer; font-weight: 900; font-size: 16px; min-height: 40px; display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; width: fit-content; max-width: 100%; border: 1px solid var(--line); background: var(--panel); border-radius: 999px; padding: 8px 12px; }
    .platform-status-summary { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .platform-count-badge { display: inline-flex; align-items: center; gap: 4px; min-height: 24px; padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px; background: #fffdf9; color: var(--muted); font-size: 12px; font-weight: 800; }
    .platform-count-badge b { color: var(--ink); font-size: 13px; line-height: 1; }
    .platforms { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin: 8px 0 0; }
    .platform-card { border: 1px solid var(--line); background: var(--panel); padding: 12px; border-radius: 8px; box-shadow: 0 8px 22px rgba(47, 38, 28, .05); }
    .platform-card strong { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 15px; margin-bottom: 8px; }
    .platform-card strong .tag { flex: 0 0 auto; font-size: 11px; font-weight: 700; }
    .tag.mode-manual { color: #fff; background: var(--bad); border-color: var(--bad); font-weight: 900; }
    .tag.mode-automatic { color: var(--ok); background: var(--ok-soft); border-color: #b7d9c5; font-weight: 800; }
    .platform-card > span { display: block; color: var(--muted); font-size: 12px; line-height: 1.5; overflow-wrap: anywhere; }
    .status-section { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 16px; }
    .status-section summary { cursor: pointer; font-weight: 900; font-size: 16px; min-height: 40px; display: inline-flex; align-items: center; gap: 8px; width: fit-content; max-width: 100%; border: 1px solid var(--line); background: var(--panel); border-radius: 999px; padding: 8px 12px; }
    details.advanced summary:hover,
    .platform-status summary:hover,
    .status-section summary:hover { border-color: var(--blue); background: var(--blue-soft); }
    .release-head { display: flex; align-items: end; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .release-head h2 { margin: 0; font-size: 18px; }
    .release-head h3 { margin: 0; font-size: 16px; }
    .release-head.subhead { margin-top: 16px; }
    .release-head span { color: var(--muted); font-size: 12px; }
    .status-grid, .release-grid, .app-status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
    .status-card, .release-card, .app-status-card { border: 1px solid var(--line); background: var(--panel); padding: 12px; border-radius: 8px; box-shadow: 0 8px 22px rgba(47, 38, 28, .05); }
    .status-card strong,
    .release-card strong,
    .app-status-card strong { display: block; font-size: 15px; margin-bottom: 8px; }
    .status-card span,
    .release-card span,
    .app-status-card span { display: block; color: var(--muted); font-size: 12px; line-height: 1.5; overflow-wrap: anywhere; }
    .app-status-card { display: grid; gap: 10px; }
    .app-status-card strong { margin-bottom: 0; }
    .app-status-row { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: #fffdf9; }
    .app-status-row b { display: block; font-size: 13px; margin-bottom: 5px; }
    .app-status-row.is-release { background: var(--lilac-soft); }
    .app-status-row.is-store { background: var(--sky-soft); }
    input, select { width: 100%; min-height: 40px; border: 1px solid var(--line); background: var(--panel); color: var(--ink); padding: 8px 10px; font: inherit; border-radius: 6px; }
    input:focus, select:focus, textarea:focus { outline: 2px solid rgba(46,111,187,.2); border-color: var(--blue); }
    input.needs-token { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(46,111,187,.18); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; align-items: start; }
    article { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); }
    article.is-due { border-color: #efb5b0; }
    article.is-done { opacity: .78; }
    .thumb { width: 100%; aspect-ratio: 1.91 / 1; object-fit: cover; display: block; border-bottom: 1px solid var(--line); background: #eee; }
    .body { padding: 14px; }
    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .platform-badge { display: inline-flex; align-items: center; min-height: 30px; padding: 6px 10px; border-radius: 999px; border: 1px solid var(--line); background: var(--ink); color: #fff; font-size: 13px; font-weight: 800; }
    .platform-badge.platform-x { background: #1da1f2; border-color: #1da1f2; }
    .platform-badge.platform-linkedin { background: #0a66c2; border-color: #0a66c2; }
    .platform-badge.platform-bluesky { background: #1685fe; border-color: #1685fe; }
    .platform-badge.platform-devto { background: #171717; }
    .platform-badge.platform-hashnode { background: #2962ff; border-color: #2962ff; }
    .platform-badge.platform-medium { background: #1f1f1f; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.35; margin-bottom: 10px; overflow-wrap: anywhere; }
    .tag { font-size: 12px; border: 1px solid var(--line); padding: 4px 7px; color: var(--muted); background: #fff; border-radius: 999px; }
    .tag.status-posted { color: var(--ok); border-color: #b7d9c5; background: var(--ok-soft); }
    .tag.status-failed { color: var(--bad); border-color: #efb5b0; background: var(--bad-soft); }
    .tag.status-approved { color: var(--blue); border-color: #acc9e7; background: var(--blue-soft); }
    .tag.status-due { color: #fff; border-color: var(--bad); background: var(--bad); }
    .tag.status-done { color: var(--ok); border-color: #b7d9c5; background: #f2fbf5; }
    .tag.verification-automatic { color: var(--blue); border-color: #acc9e7; background: var(--blue-soft); }
    .tag.verification-public { color: #6d4d00; border-color: #ead08a; background: #fff8df; }
    .tag.verification-manual { color: var(--muted); border-color: var(--line); background: #fff; }
    h2 { font-size: 17px; line-height: 1.35; margin: 0 0 6px; }
    .subtitle { color: var(--muted); font-size: 12px; margin: 0 0 10px; overflow-wrap: anywhere; }
    .card-summary { display: grid; gap: 8px; margin-bottom: 10px; }
    .card-summary .note { margin-top: 0; }
    .card-detail { display: none; margin-top: 10px; }
    article.is-expanded .card-detail { display: block; }
    .card-detail > button, .card-detail > a.button { width: 100%; display: block; margin-top: 8px; }
    textarea { width: 100%; min-height: 170px; resize: vertical; border: 1px solid var(--line); padding: 11px; font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: var(--ink); background: #fff; border-radius: 6px; }
    .actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .actions .primary { min-height: 48px; font-size: 16px; font-weight: 900; background: var(--blue); border-color: var(--blue); }
    button, a.button { min-height: 38px; border: 1px solid var(--ink); background: var(--ink); color: #fff; padding: 8px 10px; font: inherit; text-decoration: none; text-align: center; cursor: pointer; border-radius: 6px; }
    button:hover, a.button:hover { transform: translateY(-1px); }
    button.secondary, a.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
    .note { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.45; overflow-wrap: anywhere; }
    .token-note { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .error { margin-top: 10px; color: var(--bad); font-size: 12px; line-height: 1.45; overflow-wrap: anywhere; background: var(--bad-soft); border: 1px solid #efb5b0; border-radius: 6px; padding: 8px; }
    .empty { border: 1px dashed var(--line); padding: 24px; color: var(--muted); background: var(--panel); text-align: left; border-radius: 8px; }
    .empty strong { display: block; color: var(--ink); font-size: 18px; margin-bottom: 8px; }
    .empty span { display: block; line-height: 1.55; }
    @media (max-width: 900px) {
      .overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .bar { align-items: flex-start; flex-direction: column; }
      .header-right { width: 100%; justify-content: space-between; }
      .atm-action { grid-template-columns: 1fr; padding: 14px; }
      .atm-action h1 { font-size: 20px; }
      .atm-action button { min-height: 60px; font-size: 18px; }
      .quick-row { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto; gap: 8px; }
      .quick-row button { padding-left: 8px; padding-right: 8px; font-size: 13px; white-space: nowrap; }
      .auth, .controls { grid-template-columns: 1fr 1fr; }
      .auth input, .controls input { grid-column: 1 / -1; }
    }
    @media (max-width: 520px) {
      main { padding: 16px 12px 40px; }
      .overview { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin-bottom: 10px; }
      .metric-card { min-height: 58px; padding: 9px; }
      .metric-card span { font-size: 11px; line-height: 1.15; }
      .metric-card strong { font-size: 22px; }
      .metric-card strong > span:not(.state-subtext) { font-size: 22px; }
      .platform-status summary { width: 100%; align-items: flex-start; flex-direction: column; gap: 8px; border-radius: 8px; }
      .platform-status-summary { width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
      .platform-count-badge { min-height: 34px; justify-content: space-between; padding: 6px 8px; font-size: 11px; }
      .platform-count-badge b { font-size: 14px; }
      .platforms { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .auth { grid-template-columns: 1fr 1fr; }
      .auth input { grid-column: 1 / -1; }
      .controls { grid-template-columns: 1fr; }
      .controls input { grid-column: auto; }
      .quick-row { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto; }
      .quick-row button { min-height: 40px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/" aria-label="ONNELLAB home"><img class="mark" src="/favicon.svg?v=20260713-ol-pastel-v1" alt="" width="32" height="32"><div id="app-title">ONNELLAB 수동 게시</div></a>
      <div class="header-right">
        <button id="lang-toggle" type="button" class="lang">English</button>
      </div>
    </div>
  </header>
  <main>
    <section class="overview" aria-label="Publish overview">
      <button class="metric-card" type="button" data-view="due"><span id="overview-due-label">오늘 할 일</span><strong class="due-count">0</strong></button>
      <button class="metric-card" type="button" data-view="manual"><span id="overview-manual-label">수동 대기</span><strong id="manual-count">2</strong></button>
      <button class="metric-card" type="button" data-view="done"><span id="overview-posted-label">게시 완료</span><strong id="posted-count">4</strong></button>
    </section>
    <section class="atm-action" aria-label="Primary verification action">
      <div>
        <h1 id="atm-title">게시 여부 확인</h1>
        <p id="atm-copy">X와 LinkedIn의 공개 게시물을 확인하고, 일치하는 수동 게시 항목만 완료로 표시합니다.</p>
        <div id="token-note" class="atm-note">GitHub 토큰 연결 후 동기화와 공개 확인을 실행할 수 있습니다.</div>
      </div>
      <div class="atm-side">
        <button id="verify-publications-primary" type="button">게시 확인 및 완료 반영</button>
        <div class="atm-status-row" aria-label="Sync and verification status">
          <button type="button" id="refresh-state-large"><span id="overview-sync-label">동기화</span><strong id="sync-state-large">...</strong></button>
          <button type="button" id="verify-publications-large"><span id="overview-verify-label">공개 확인</span><strong id="verify-state-large">...</strong></button>
        </div>
        <a id="verification-run-link" class="run-link" href="#" target="_blank" rel="noopener" hidden>실행 기록</a>
      </div>
    </section>
    <section class="verification-summary" aria-label="Verification result summary">
      <strong id="verification-summary-title">공개 확인 결과</strong>
      <div id="verification-summary-grid" class="verification-summary-grid"></div>
      <div id="verification-summary-note" class="note"></div>
    </section>
    <section class="tool-panel" aria-label="Publish controls">
    <div class="quick-row">
      <select id="platform"><option value="">모든 매체</option></select>
      <select id="visibility"><option value="due">게시 예정만</option><option value="active">진행 항목만</option><option value="all">완료 포함</option></select>
      <button id="toggle-variants" type="button" class="secondary">대안 보기</button>
    </div>
    <details class="advanced">
      <summary id="advanced-summary">상세 필터와 동기화</summary>
      <div class="controls">
        <input id="search" type="search" placeholder="토픽, 매체, 언어, 상태 검색">
        <select id="language"><option value="">모든 언어</option></select>
        <select id="status"><option value="">모든 상태</option></select>
        <select id="mode"><option value="manual">수동만</option><option value="automatic">자동화만</option><option value="">전체</option></select>

nerated/social/variants/linkedin_short/en/reading/read-large-txt-files-without-lag.txt", "canonical_url": "https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "card_asset_path": "generated/assets/blog/en/read-large-txt-files-without-lag/social-card.png", "card_asset_href": "/blog-assets/en/read-large-txt-files-without-lag/social-card.png", "text": "Teams often lose time on large TXT files because the first tool treats them like small notes.\n\nThe useful test is simple: decide whether the file needs quick reading, search, light edits, or full editing before choosing the tool.\n\n- Start by opening a copy of the file, not the only original.\n- Confirm the encoding if the text appears broken or unreadable.\n\nRead the full article:\nhttps://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "length": 450, "approved_at": "", "posted_url": "", "posted_at": "", "last_attempt_at": "", "error_type": "", "error": "", "open_url": "https://www.linkedin.com/sharing/share-offsite/?url=https%3A//onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "due_at": "2026-07-12T00:00:00+09:00"}, {"kind": "syndication", "topic_id": "TOPIC-0001", "platform": "devto", "publishing_mode": "automatic", "platform_label": "Dev.to", "language": "en", "slug": "read-large-txt-files-without-lag", "template_id": "markdown", "manual_key": "TOPIC-0001::devto::en::markdown", "is_variant": false, "status": "posted", "draft_path": "generated/syndication/devto/en/reading/read-large-txt-files-without-lag.md", "canonical_url": "https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "card_asset_path": "", "card_asset_href": "", "text": "---\ntitle: \"How to Read Large TXT Files Without Lag\"\npublished: false\ncanonical_url: \"https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/\"\ntags: \"large-txt-file-reader,txt-viewer,plain-text,reading-workflow\"\n---\n\n> ONNELLAB note: This version focuses on the rendering and workflow details behind large text files.\n\nLarge TXT files become interesting when the UI treats the whole document as one editable surface. Rendering strategy, memory pressure, and search indexing often matter more than the file extension.\n\n# How to Read Large TXT Files Without Lag\n\n## Question\n\nHow can I read a very large TXT file without lag?\n\n## Short Answer\n\nUse a reader that does not try to load and render the entire TXT file at once. Large TXT files become slow when an app treats the whole document as one visible text area. A better workflow is to confirm the file encoding, avoid unnecessary formatting conversion, use search and bookmarks carefully, and choose a large TXT file reader designed for plain-text viewing.\n\n## Why Large TXT Files Become Slow\n\nA TXT file looks simple, but a very large TXT file can still be difficult for a mobile or desktop app to handle. The problem is usually not the TXT format itself. The problem is how the app opens, stores, searches, and renders the file.\n\nMany general-purpose editors are optimized for short notes or normal documents. With a huge text file, they may load the full buffer, calculate layout for every line, and keep the document ready for editing before the reader has done anything. That is where scrolling, search, and memory use start to feel connected.\n\nThe most important distinction is between reading and editing. Reading a large plain-text file should be lighter than editing it. If the app prepares the entire file for editing before you even start reading, the experience can become slow.\n\n## Common Situations\n\nLarge TXT files usually appear in practical workflows rather than as polished documents. You might be opening an exported chat history, a long web novel saved as plain text, a server log, a subtitle or transcript file, or a backup export from another tool.\n\nThese files have different structures, but the reading problem is similar. You need to find the right section quickly without making the app reprocess more text than necessary.\n\n## What Makes a TXT File Feel Slow\n\nFile size matters, but it is not the only factor. A 50 MB TXT file with short, regular lines may feel easier to handle than a smaller file with extremely long lines, unusual characters, or a structure that forces the app to calculate a large layout before showing anything.\n\nThe number of lines, the length of each line, the file encoding, available device memory, and the app's search behavior can all affect the experience. If the file is slow only when searching, the bottleneck may be different from a file that is slow immediately after opening.\n\nBefore changing tools, identify the task. Reading, searching, bookmarking, converting, and editing require different amounts of memory and processing. A workflow that is good for quick inspection may not be the best workflow for heavy editing.\n\n## What To Check First\n\n- Confirm that the file is actually plain text and not a renamed binary or document file.\n- Check whether the file uses a common encoding such as UTF-8.\n- Avoid opening the file in a rich text editor when you only need to read it.\n- Keep a backup before using tools that modify or resave the file.\n- If the file is extremely large, prefer search, bookmarks, and section-based navigation over repeated full-document scrolling.\n\nEncoding is the rule an app uses to turn bytes into readable characters. UTF-8 is common, but older files may use another encoding. If letters appear as broken symbols, the file may not be damaged; the app may simply be reading it with the wrong encoding.\n\n## Recommended Workflow\n\n1. Start by opening a copy of the file, not the only original.\n2. Confirm the encoding if the text appears broken or unreadable.\n3. Use a plain-text reader or editor instead of a word processor.\n4. Search for the section you need before scrolling through the whole file.\n5. Add bookmarks or split points if you return to the same parts often.\n6. Edit only when necessary, because editing usually requires more memory and processing than reading.\n\n> The safest workflow is to treat a huge TXT file as a reference document first and an editable document second.\n\n![Large TXT file reading workflow diagram](/blog-assets/en/read-large-txt-files-without-lag/workflow-diagram.svg \"Workflow diagram: file check, encoding check, reading mode, search, bookmarks, optional app\")\n\n## Loading the Whole File vs Rendering What You Need\n\n| Approach | What happens | Best for |\n| --- | --- | --- |\n| Load everything at once | The app prepares the full file in memory and may calculate layout for the entire document. | Small and normal text files |\n| Render visible text first | The app prioritizes the part of the file you are reading and delays unnecessary work. | Very large TXT files |\n| Convert to another format | The file is transformed into a different structure before reading. | Archiving or publishing, not quick reading |\n\nVirtual rendering is a technique where an app renders only the visible portion of a large document instead of drawing every line immediately. It can reduce memory pressure and make scrolling feel more responsive. The exact implementation depends on the app, so avoid assuming that every TXT reader handles large files the same way.\n\n## When Splitting the File Helps\n\nSplitting a large TXT file can help when the document is too large for the tools you already use. It can also make backups and manual review easier. However, splitting is not always the best first step.\n\nIf the file has a meaningful structure, such as chapters, logs by date, or exported sections, splitting can make the document easier to manage. If the file is just one continuous export, splitting may create more files to track without solving the underlying reading workflow.\n\n## Where VaultXT Fits\n\nThis is the kind of workflow [VaultXT](/apps/vaultxt/) is built around: open the plain-text file first, then search, bookmark, or edit only when the task actually needs it.\n\nIt is not meant to make every document workflow more complex. It is most relevant when the recurring problem is opening and navigating large TXT files, not formatting rich documents.\n\n## Related Topics\n\n- Large text file performance\n- TXT encoding and unreadable characters\n- Plain-text reading workflows\n- Search and bookmarks in long documents\n\n## References\n\n- [The Unicode Standard](https://www.unicode.org/versions/latest/) for the official Unicode specification and related character encoding references.\n\n## Conclusion\n\nStart by treating the TXT file as something to read and inspect, not something to fully edit. Confirm that the file is plain text, check encoding when characters look wrong, use search and bookmarks before repeated scrolling, and choose a large TXT file reader designed for plain-text files when the problem happens often.\n\n## FAQ\n\n### Can a large TXT file damage my device?\n\nThe file itself does not damage hardware. What usually happens is more mundane: the app may use too much memory, slow down, or stop responding.\n\n### Should I convert a large TXT file to PDF or EPUB?\n\nConversion helps when the goal is publishing, sharing, or structured long-form reading. For quick inspection or search, it often adds work without solving the bottleneck.\n\n### Is a text editor always better than a text reader?\n\nNot always. Use an editor when you need to change the file. Use a reader when the job is fast navigation, search, and viewing.\n\n### When should I use VaultXT?\n\nUse VaultXT when the main task is opening, reading, searching, or lightly editing large plain-text files. It is not a replacement for every document editor or publishing tool.\n\n---\n\nOriginally published at https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "length": 8012, "approved_at": "2026-07-13T11:47:53+09:00", "posted_url": "https://dev.to/onnellab/how-to-read-large-txt-files-without-lag-5dad-temp-slug-4247352", "posted_at": or heavy editing.\n\n## What To Check First\n\n- Confirm that the file is actually plain text and not a renamed binary or document file.\n- Check whether the file uses a common encoding such as UTF-8.\n- Avoid opening the file in a rich text editor when you only need to read it.\n- Keep a backup before using tools that modify or resave the file.\n- If the file is extremely large, prefer search, bookmarks, and section-based navigation over repeated full-document scrolling.\n\nEncoding is the rule an app uses to turn bytes into readable characters. UTF-8 is common, but older files may use another encoding. If letters appear as broken symbols, the file may not be damaged; the app may simply be reading it with the wrong encoding.\n\n## Recommended Workflow\n\n1. Start by opening a copy of the file, not the only original.\n2. Confirm the encoding if the text appears broken or unreadable.\n3. Use a plain-text reader or editor instead of a word processor.\n4. Search for the section you need before scrolling through the whole file.\n5. Add bookmarks or split points if you return to the same parts often.\n6. Edit only when necessary, because editing usually requires more memory and processing than reading.\n\n> The safest workflow is to treat a huge TXT file as a reference document first and an editable document second.\n\n![Large TXT file reading workflow diagram](/blog-assets/en/read-large-txt-files-without-lag/workflow-diagram.svg \"Workflow diagram: file check, encoding check, reading mode, search, bookmarks, optional app\")\n\n## Loading the Whole File vs Rendering What You Need\n\n| Approach | What happens | Best for |\n| --- | --- | --- |\n| Load everything at once | The app prepares the full file in memory and may calculate layout for the entire document. | Small and normal text files |\n| Render visible text first | The app prioritizes the part of the file you are reading and delays unnecessary work. | Very large TXT files |\n| Convert to another format | The file is transformed into a different structure before reading. | Archiving or publishing, not quick reading |\n\nVirtual rendering is a common way to keep large text views responsive: the app prioritizes visible lines and avoids drawing the entire document at once. The exact implementation varies, but the important trade-off is the same: reduce memory pressure without making search and navigation feel disconnected.\n\n## When Splitting the File Helps\n\nSplitting a large TXT file can help when the document is too large for the tools you already use. It can also make backups and manual review easier. However, splitting is not always the best first step.\n\nIf the file has a meaningful structure, such as chapters, logs by date, or exported sections, splitting can make the document easier to manage. If the file is just one continuous export, splitting may create more files to track without solving the underlying reading workflow.\n\n## Where VaultXT Fits\n\nThis is the kind of workflow [VaultXT](/apps/vaultxt/) is built around: open the plain-text file first, then search, bookmark, or edit only when the task actually needs it.\n\nIt is not meant to make every document workflow more complex. It is most relevant when the recurring problem is opening and navigating large TXT files, not formatting rich documents.\n\n## Related Topics\n\n- Large text file performance\n- TXT encoding and unreadable characters\n- Plain-text reading workflows\n- Search and bookmarks in long documents\n\n## References\n\n- [The Unicode Standard](https://www.unicode.org/versions/latest/) for the official Unicode specification and related character encoding references.\n\n## Conclusion\n\nStart by treating the TXT file as something to read and inspect, not something to fully edit. Confirm that the file is plain text, check encoding when characters look wrong, use search and bookmarks before repeated scrolling, and choose a large TXT file reader designed for plain-text files when the problem happens often.\n\n## FAQ\n\n### Can a large TXT file damage my device?\n\nThe file itself does not damage hardware. What usually happens is more mundane: the app may use too much memory, slow down, or stop responding.\n\n### Should I convert a large TXT file to PDF or EPUB?\n\nConversion helps when the goal is publishing, sharing, or structured long-form reading. For quick inspection or search, it often adds work without solving the bottleneck.\n\n### Is a text editor always better than a text reader?\n\nNot always. Use an editor when you need to change the file. Use a reader when the job is fast navigation, search, and viewing.\n\n### When should I use VaultXT?\n\nUse VaultXT when the main task is opening, reading, searching, or lightly editing large plain-text files. It is not a replacement for every document editor or publishing tool.\n\n---\n\nOriginally published at https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "length": 8069, "approved_at": "", "posted_url": "", "posted_at": "", "last_attempt_at": "", "error_type": "", "error": "", "open_url": "https://hashnode.com/draft", "due_at": "2026-07-14T00:00:00+09:00"}, {"kind": "syndication", "topic_id": "TOPIC-0001", "platform": "medium", "publishing_mode": "manual", "platform_label": "Medium", "language": "en", "slug": "read-large-txt-files-without-lag", "template_id": "markdown", "manual_key": "TOPIC-0001::medium::en::markdown", "is_variant": false, "status": "draft", "draft_path": "generated/syndication/medium/en/reading/read-large-txt-files-without-lag.md", "canonical_url": "https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "card_asset_path": "", "card_asset_href": "", "text": "> ONNELLAB note: This version keeps the practical checklist and leaves the product details secondary.\n\nThe useful question is not only which app can open a large TXT file. It is what the reader needs to do after the file opens: inspect, search, bookmark, split, or edit.\n\n# How to Read Large TXT Files Without Lag\n\n## Question\n\nHow can I read a very large TXT file without lag?\n\n## Short Answer\n\nUse a reader that does not try to load and render the entire TXT file at once. Large TXT files become slow when an app treats the whole document as one visible text area. A better workflow is to confirm the file encoding, avoid unnecessary formatting conversion, use search and bookmarks carefully, and choose a large TXT file reader designed for plain-text viewing.\n\n## Why Large TXT Files Become Slow\n\nA TXT file looks simple, but a very large TXT file can still be difficult for a mobile or desktop app to handle. The problem is usually not the TXT format itself. The problem is how the app opens, stores, searches, and renders the file.\n\nMany general-purpose editors are designed for short notes or normal documents. When they open a huge text file, they may try to load the full file into memory, calculate layout for every line, and keep the whole editable document ready at all times. That can make scrolling, searching, and editing feel delayed.\n\nThe most important distinction is between reading and editing. Reading a large plain-text file should be lighter than editing it. If the app prepares the entire file for editing before you even start reading, the experience can become slow.\n\n## Common Situations\n\nLarge TXT files usually appear in practical workflows rather than polished documents. The file may be an exported chat history, a long web novel saved as plain text, a server log, a transcript, or a backup export that someone simply needs to inspect without turning it into another project.\n\nThese files have different structures, but the reading problem is similar. You need to find the right section quickly without making the app reprocess more text than necessary.\n\n## What Makes a TXT File Feel Slow\n\nFile size matters, but it is not the only factor. A 50 MB TXT file with short, regular lines may feel easier to handle than a smaller file with extremely long lines, unusual characters, or a structure that forces the app to calculate a large layout before showing anything.\n\nThe number of lines, the length of each line, the file encoding, available device memory, and the app's search behavior can all affect the experience. If the file is slow only when searching, the bottleneck may be different from a file that is slow immediately after opening.\n\nBefore changing tools, identify the task. Reading, searching, bookmarking, converting, and editing require different amounts of memory and processing. A workflow that is good for quick inspection may not be the best workflow for heavy editing.\n\n## What To Check First\n\n- Confirm that the file is actually plain text and not a renamed binary or document file.\n- Check whether the file uses a common encoding such as UTF-8.\n- Avoid opening the file in a rich text editor when you only need to read it.\n- Keep a backup before using tools that modify or resave the file.\n- If the file is extremely large, prefer search, bookmarks, and section-based navigation over repeated full-document scrolling.\n\nEncoding is the rule an app uses to turn bytes into readable characters. UTF-8 is common, but older files may use another encoding. If letters appear as broken symbols, the file may not be damaged; the app may simply be reading it with the wrong encoding.\n\n## Recommended Workflow\n\n1. Start by opening a copy of the file, not the only original.\n2. Confirm the encoding if the text appears broken or unreadable.\n3. Use a plain-text reader or editor instead of a word processor.\n4. Search for the section you need before scrolling through the whole file.\n5. Add bookmarks or split points if you return to the same parts often.\n6. Edit only when necessary, because editing usually requires more memory and processing than reading.\n\n> The safest workflow is to treat a huge TXT file as a reference document first and an editable document second.\n\n![Large TXT file reading workflow diagram](/blog-assets/en/read-large-txt-files-without-lag/workflow-diagram.svg \"Workflow diagram: file check, encoding check, reading mode, search, bookmarks, optional app\")\n\n## Loading the Whole File vs Rendering What You Need\n\n| Approach | What happens | Best for |\n| --- | --- | --- |\n| Load everything at once | The app prepares the full file in memory and may calculate layout for the entire document. | Small and normal text files |\n| Render visible text first | The app prioritizes the part of the file you are reading and delays unnecessary work. | Very large TXT files |\n| Convert to another format | The file is transformed into a different structure before reading. | Archiving or publishing, not quick reading |\n\nVirtual rendering is a technique where an app renders only the visible portion of a large document instead of drawing every line immediately. It can reduce memory pressure and make scrolling feel more responsive. The exact implementation depends on the app, so avoid assuming that every TXT reader handles large files the same way.\n\n## When Splitting the File Helps\n\nSplitting a large TXT file can help when the document is too large for the tools you already use. It can also make backups and manual review easier. However, splitting is not always the best first step.\n\nIf the file has a meaningful structure, such as chapters, logs by date, or exported sections, splitting can make the document easier to manage. If the file is just one continuous export, splitting may create more files to track without solving the underlying reading workflow.\n\n## Where VaultXT Fits\n\nThis is the kind of workflow [VaultXT](/apps/vaultxt/) is built around: open the plain-text file first, then search, bookmark, or edit only when the task actually needs it.\n\nIt is not meant to make every document workflow more complex. It is most relevant when the recurring problem is opening and navigating large TXT files, not formatting rich documents.\n\n## Related Topics\n\n- Large text file performance\n- TXT encoding and unreadable characters\n- Plain-text reading workflows\n- Search and bookmarks in long documents\n\n## References\n\n- [The Unicode Standard](https://www.unicode.org/versions/latest/) for the official Unicode specification and related character encoding references.\n\n## Conclusion\n\nStart by treating the TXT file as something to read and inspect, not something to fully edit. Confirm that the file is plain text, check encoding when characters look wrong, use search and bookmarks before repeated scrolling, and choose a large TXT file reader designed for plain-text files when the problem happens often.\n\n## FAQ\n\n### Can a large TXT file damage my device?\n\nThe file itself does not damage hardware. What usually happens is more mundane: the app may use too much memory, slow down, or stop responding.\n\n### Should I convert a large TXT file to PDF or EPUB?\n\nConversion helps when the goal is publishing, sharing, or structured long-form reading. For quick inspection or search, it often adds work without solving the bottleneck.\n\n### Is a text editor always better than a text reader?\n\nNot always. Use an editor when you need to change the file. Use a reader when the job is fast navigation, search, and viewing.\n\n### When should I use VaultXT?\n\nUse VaultXT when the main task is opening, reading, searching, or lightly editing large plain-text files. It is not a replacement for every document editor or publishing tool.\n\n---\n\nOriginally published at https://onnellab.github.io/blog/en/read-large-txt-files-without-lag/", "length": 7782, "approved_at": "", "posted_url": "", "posted_at": "", "last_attempt_at": "", "error_type": "", "error": "", "open_url": "https://medium.com/new-story", "due_at": "2026-07-15T00:00:00+09:00"}]</script>

      Object.entries(current).forEach(([key, value]) => {

      });
      applyTranslations();

    function setStateContent(element, label, isWorking = false, subtext = '') {

        small.className = 'state-subtext';

    function clearVerifyCountdown() {
      if (verifyCountdownTimer) clearInterval(verifyCountdownTimer);
      verifyCountdownTimer = null;
      verifyCountdownRemaining = 0;
    }

    function startVerifyCountdown(seconds) {
      clearVerifyCountdown();
      verifyCountdownRemaining = seconds;
      setVerifyState('verificationStarted', verifyCountdownRemaining);
      verifyCountdownTimer = setInterval(() => {
        verifyCountdownRemaining -= 1;
        if (verifyCountdownRemaining <= 0) {
          clearVerifyCountdown();
          loadRemoteState({ refreshDashboardData: true });
          return;
        }
        setVerifyState('verificationStarted', verifyCountdownRemaining);
      }, 1000);
    }

    function workflowRunLabel(run) {
      if (!run) return 'verificationStarted';
      if (run.status === 'queued' || run.status === 'requested' || run.status === 'waiting' || run.status === 'pending') return 'verificationQueued';
      if (run.status === 'in_progress') return 'verificationRunning';
      if (run.status === 'completed' && run.conclusion === 'success') return 'verificationCompleted';
      if (run.status === 'completed') return 'verificationFailed';
      return 'verificationStarted';
    }

    async function latestVerificationRun() {
      const query = new URLSearchParams({ branch: stateBranch, event: 'workflow_dispatch', per_page: '1' });
      const data = await githubRequest(`/repos/${stateRepo}/actions/workflows/verify-manual-publications.yml/runs?${query.toString()}`);
      return data.workflow_runs?.[0] || null;
    }

    async function refreshVerificationRunLink() {
      if (!githubToken()) {
        clearVerificationRunLink();
        return;
      }
      try {
        setVerificationRunLink(await latestVerificationRun());
      } catch (error) {
        console.warn(error);
      }
    }

    async function pollVerificationRun(maxAttempts = 36) {
      clearVerifyCountdown();
      let run = null;
      for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
        try {
          run = await latestVerificationRun();
          setVerificationRunLink(run);
          setVerifyState(workflowRunLabel(run));
          if (run?.status === 'completed') {
            await loadRemoteState({ refreshDashboardData: true });
            setVerifyState(run.conclusion === 'success' ? 'verificationCompleted' : 'verificationFailed');
            return;
          }
        } catch (error) {
          console.warn(error);
        }
        await new Promise((resolve) => setTimeout(resolve, attempt < 4 ? 5000 : 10000));
      }
      startVerifyCountdown(30);
    }

    function decodeBase64Unicode(value) {
      const binary = atob(value.replace(/\n/g, ''));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function encodeBase64Unicode(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = '';
      bytes.forEach((byte) => binary += String.fromCharCode(byte));
      return btoa(binary);
    }

    async function githubRequest(path, options = {}) {
      const token = githubToken();
      const authHeaders = token ? { 'Authorization': 'Bearer ' + token } : {};
      const response = await fetch('https://api.github.com' + path, {
        ...options,
        headers: {
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
          ...authHeaders,
          ...(options.headers || {}),
        },
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.message || 'GitHub request failed');
      return data;
    }

    async function triggerPublicationVerification() {
      if (!githubToken()) {
        setVerifyState('verificationTokenRequired');
        revealTokenInput();
        return;

      setVerifyState('verifyingPublications');
      clearVerificationRunLink();
      verifyButtonLarge.disabled = true;
      verifyButtonPrimary.disabled = true;
      try {
        await githubRequest(`/repos/${stateRepo}/actions/workflows/verify-manual-publications.yml/dispatches`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: stateBranch, inputs: { visual_public_pages: 'true' } }),
        });
        setVerifyState('verificationQueued');
        await pollVerificationRun();
      } catch (error) {
        clearVerifyCountdown();
        setVerifyState('verificationFailed');
        setSync('syncError');
        console.error(error);
      } finally {
        verifyButtonLarge.disabled = false;
        verifyButtonPrimary.disabled = false;
      }
    }

    function readEmbeddedJson(doc, id) {
      const element = doc.getElementById(id);
      return element ? JSON.parse(element.textContent || '[]') : [];
    }

    async function refreshDashboardDataFromPublishedPage() {
      const url = new URL(window.location.href);
      url.searchParams.set('refresh', String(Date.now()));
      const response = await fetch(url.toString(), { cache: 'no-store' });
      if (!response.ok) throw new Error('Failed to refresh dashboard data');
      const doc = new DOMParser().parseFromString(await response.text(), 'text/html');
      items = readEmbeddedJson(doc, 'manual-data');
      releases = readEmbeddedJson(doc, 'release-data');
      blogItems = readEmbeddedJson(doc, 'blog-data');
      storeItems = readEmbeddedJson(doc, 'store-data');
      siteItems = readEmbeddedJson(doc, 'site-data');
      releaseSyncStatus = readEmbeddedJson(doc, 'release-sync-data');
      verificationReport = readEmbeddedJson(doc, 'verification-report-data');
      syncFilterOptions();
    }

    async function loadRemoteState(options = {}) {
      clearVerifyCountdown();
      setSync('syncing');
      try {
        const data = await githubRequest(`/repos/${stateRepo}/contents/${statePath}?ref=${stateBranch}`);
        remoteSha = data.sha;
        remoteState = JSON.parse(decodeBase64Unicode(data.content));
        remoteState.done ||= {};
        if (options.refreshDashboardData) {
          try {
            await refreshDashboardDataFromPublishedPage();
          } catch (refreshError) {
            console.warn(refreshError);
          }
        }
        setSync(githubToken() ? 'synced' : 'viewOnly');
        setVerifyState(githubToken() ? 'verificationReady' : 'verificationTokenRequired');
        await refreshVerificationRunLink();
      } catch (error) {
        setSync('syncError');
        console.error(error);
      }
      render();
    }

    async function updateAppBadge() {
      const count = items.filter(isDue).length;
      if (!('setAppBadge' in navigator) || !('clearAppBadge' in navigator)) return;
      try {
        if (count > 0) await navigator.setAppBadge(count);
        else await navigator.clearAppBadge();
      } catch (error) {
        console.warn(error);
      }
    }

    async function saveRemoteState(message) {
      if (!githubToken()) throw new Error('GitHub token is required to save synced state');
      remoteState.updated_at = new Date().toISOString();
      const content = encodeBase64Unicode(JSON.stringify(remoteState, null, 2) + '\n');
      const payload = { message, content, branch: stateBranch };
      if (remoteSha) payload.sha = remoteSha;
      const data = await githubRequest(`/repos/${stateRepo}/contents/${statePath}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      remoteSha = data.content.sha;
      setSync('synced');
    }

    async function saveWithMerge(message, localDone) {
      try {
        await saveRemoteState(message);
      } catch (error) {
        if (!String(error.message || '').includes('sha')) throw error;
        await loadRemoteState();
        remoteState.done ||= {};
        Object.assign(remoteState.done, localDone);
        await saveRemoteState(message + ' after sync refresh');
      }
    }

        flash(button, t('openImageFallback'));
        return;

      const response = await fetch(src);
      const blob = await response.blob();
      await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
      flash(button, t('imageCopied'));
    }
