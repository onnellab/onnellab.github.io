<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Large TXT file reading workflow</title>
  <desc id="desc">A calm ONNELLAB workflow diagram showing how to inspect a large TXT file, check encoding, choose reading mode, use search and bookmarks, and optionally use a large TXT file reader.</desc>
  <rect width="1200" height="675" fill="#fbf7ef"/>
  <rect x="54" y="48" width="1092" height="579" rx="28" fill="#fffdf8" stroke="#ded7ca" stroke-width="2"/>
  <text x="96" y="112" fill="#2f302c" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="720">Read large TXT files without lag</text>
  <text x="96" y="154" fill="#6c675e" font-family="Inter, system-ui, sans-serif" font-size="20">Check the file first, then choose the lightest workflow for reading, search, and navigation.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(94 218)">
      <rect width="170" height="138" rx="18" fill="#e7f2fb" stroke="#b9d7ea" stroke-width="2"/>
      <text x="24" y="42" fill="#2f302c" font-size="18" font-weight="700">1. File check</text>
      <text x="24" y="76" fill="#5e615c" font-size="15">Plain text?</text>
      <text x="24" y="102" fill="#5e615c" font-size="15">Copy preserved?</text>
    </g>
    <g transform="translate(308 218)">
      <rect width="170" height="138" rx="18" fill="#eee8f7" stroke="#cfc0e5" stroke-width="2"/>
      <text x="24" y="42" fill="#2f302c" font-size="18" font-weight="700">2. Encoding</text>
      <text x="24" y="76" fill="#5e615c" font-size="15">UTF-8 first</text>
      <text x="24" y="102" fill="#5e615c" font-size="15">Fix broken text</text>
    </g>
    <g transform="translate(522 218)">
      <rect width="170" height="138" rx="18" fill="#fde9df" stroke="#efc4ad" stroke-width="2"/>
      <text x="24" y="42" fill="#2f302c" font-size="18" font-weight="700">3. Read mode</text>
      <text x="24" y="76" fill="#5e615c" font-size="15">Avoid rich text</text>
      <text x="24" y="102" fill="#5e615c" font-size="15">Render visible text</text>
    </g>
    <g transform="translate(736 218)">
      <rect width="170" height="138" rx="18" fill="#e7f2fb" stroke="#b9d7ea" stroke-width="2"/>
      <text x="24" y="42" fill="#2f302c" font-size="18" font-weight="700">4. Navigate</text>
      <text x="24" y="76" fill="#5e615c" font-size="15">Search first</text>
      <text x="24" y="102" fill="#5e615c" font-size="15">Bookmark sections</text>
    </g>
    <g transform="translate(950 218)">
      <rect width="170" height="138" rx="18" fill="#eef3e8" stroke="#c8d8bb" stroke-width="2"/>
      <text x="24" y="42" fill="#2f302c" font-size="18" font-weight="700">5. Tool choice</text>
      <text x="24" y="76" fill="#5e615c" font-size="15">Use a large</text>
      <text x="24" y="102" fill="#5e615c" font-size="15">TXT file reader</text>
    </g>
  </g>

  <g fill="none" stroke="#8c867b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M270 287h30"/>
    <path d="M292 278l10 9-10 9"/>
    <path d="M484 287h30"/>
    <path d="M506 278l10 9-10 9"/>
    <path d="M698 287h30"/>
    <path d="M720 278l10 9-10 9"/>
    <path d="M912 287h30"/>
    <path d="M934 278l10 9-10 9"/>
  </g>

  <rect x="96" y="418" width="1008" height="116" rx="18" fill="#f7f2e9" stroke="#ded7ca" stroke-width="2"/>
  <text x="126" y="462" fill="#2f302c" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">Key idea</text>
  <text x="126" y="499" fill="#5d5a52" font-family="Inter, system-ui, sans-serif" font-size="18">Treat a huge TXT file as a reference document first. Edit only when necessary.</text>
  <text x="96" y="584" fill="#8a857b" font-family="Inter, system-ui, sans-serif" font-size="15">ONNELLAB Blog · Workflow diagram</text>
</svg>
